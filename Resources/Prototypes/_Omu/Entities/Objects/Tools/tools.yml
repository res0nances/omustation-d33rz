- type: entity
  name: CentComm intern handheld fax
  parent: HandheldFax
  id: HandheldFaxCentCommIntern
  suffix: CentComm Intern
  components:
  - type: FaxMachine
    name: "CentComm Intern"
  - type: Item
    size: Normal
    sprite: _Omu/Objects/Tools/intern_fax.rsi
  - type: Prayable
    sentMessage: prayer-popup-notify-centcom-sent
    notificationPrefix: prayer-chat-notify-centcom
    verb: prayer-verbs-call
    verbImage: null
  - type: Sprite
    sprite: _Omu/Objects/Tools/intern_fax.rsi
    drawdepth: SmallObjects
    layers:
    - state: icon
      map: [ "enum.FaxMachineVisuals.VisualState" ]
    - state: scanner
      shader: unshaded

- type: entity
  name: Nanotrasen Representative handheld fax
  parent: HandheldFax
  id: HandheldFaxNanotrasenRepresentative
  suffix: Nanotrasen Representative
  components:
  - type: FaxMachine
    name: "Nanotrasen Representative"
  - type: Item
    size: Normal
    sprite: _Goobstation/Objects/Tools/official_fax.rsi
  - type: Prayable
    sentMessage: prayer-popup-notify-centcom-sent
    notificationPrefix: prayer-chat-notify-centcom
    verb: prayer-verbs-call
    verbImage: null
    notificationSound:
      path: /Audio/_Goobstation/Misc/phone_ring.ogg
  - type: Sprite
    sprite: _Goobstation/Objects/Tools/official_fax.rsi
    drawdepth: SmallObjects
    layers:
    - state: icon
      map: [ "enum.FaxMachineVisuals.VisualState" ]
    - state: scanner
      shader: unshaded

- type: entity
  id: RPDRechargingCE
  parent: RPD
  name: experimental RPD
  description: A bluespace-enhanced rapid piping device that passively generates its own compressed matter.
  suffix: AutoRecharge
  components:
  - type: LimitedCharges
    maxCharges: 40
  - type: AutoRecharge
    rechargeDuration: 5
