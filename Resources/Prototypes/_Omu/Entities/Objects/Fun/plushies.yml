    slots:
    - HEAD
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_EinsteinEngines/Voice/Shadowkin/wurble.ogg
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_squawk_1.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/_EinsteinEngines/Voice/Shadowkin/wurble.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/_Starlight/Voice/Resomi/resomi_squawk_1.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/_Floofstation/Voice/Avali/avali_cry.ogg
# lydia fax stuff
  - type: FaxMachine
    name: "Lydia Plushie"
    responsePings: false
    paperSlot:
      insertSound: /Audio/Machines/scanning.ogg
      ejectSound: /Audio/Machines/tray_eject.ogg
      whitelist:
        components:
          - FaxableObject #used to be PaperComponent - brainfood1183
      blacklist:
        components:
          - CargoSlip
  - type: ActivatableUI
    key: enum.FaxUiKey.Key
  - type: UserInterface
    interfaces:
      enum.FaxUiKey.Key:
        type: FaxBoundUi
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: Fax
    transmitFrequencyId: Fax
  - type: ApcPowerReceiver
    needsPower: false
    powerLoad: 250
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      Paper: !type:ContainerSlot
      stash: !type:ContainerSlot {}
  - type: MeleeWeapon
    wideAnimationRotation: 180
    attackRate: .1
    soundHit:
      path: /Audio/_Goobstation/Weapons/ChronoLegionnaire/stasisgun_reload.ogg

