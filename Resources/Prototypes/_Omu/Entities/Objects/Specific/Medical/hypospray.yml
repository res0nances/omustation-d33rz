- type: entity
  name: autoinjector cartridge (empty)
  parent: [ BaseSecurityMedicalContraband , BaseAutoinjectorCartridge ]
  description: A empty autoinjector cartridge with endless potential. Does not allow for deviation from Nanotrasen recipes.
  id: CartridgeEmpty
  components:
  - type: Sprite
    layers:
    - state: base
  - type: SolutionCartridge
    targetSolution: hypospray
    solution:
      maxVol: 0.25
      reagents:
      - ReagentId: Microplastics
        Quantity: 0.25

- type: entity
  name: autoinjector cartridge (amoxla)
  parent: [ BaseSecurityMedicalContraband , BaseAutoinjectorCartridge ]
  description: Contains 3u of amoxla, and 7u of sugar used in a cartridge autoinjector.
  id: CartridgeAmoxla
  components:
  - type: Sprite
    layers:
    - state: base
    - state: filling
      color: "#64ecb3"
  - type: SolutionCartridge
    targetSolution: hypospray
    solution:
      maxVol: 10
      reagents:
      - ReagentId: Amoxla
        Quantity: 3
      - ReagentId: Sugar
        Quantity: 7

- type: entity
  name: autoinjector cartridge (radiation)
  parent: [ BaseSecurityMedicalContraband , BaseAutoinjectorCartridge ]
