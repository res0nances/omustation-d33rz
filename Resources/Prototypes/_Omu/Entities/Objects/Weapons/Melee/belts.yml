- type: entity
  id: DisciplinaryBeltBase
  parent: ClothingBeltBase
  abstract: true
  components:
  # overriding default equip and unequip sounds
  - type: Clothing
    equipSound:
       path: /Audio/_Omu/Items/Belts/BeltBuckle.ogg
       params:
         volume: -3
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Omu/Items/Belts/BeltPickup.ogg
      params:
        volume: -3
  - type: EmoteOnMeleeHit
    emoteChance: 1
    emotes:
    - Scream
  - type: EmitSoundOnUse
    sound:
      path: /Audio/_Omu/Items/Belts/BeltSnap.ogg
      params:
        maxDistance: 15
  - type: UseDelay
    delay: 1

- type: entity
  id: CentCommBelt
  parent: [BaseCentcommContraband, DisciplinaryBeltBase]
  name: central command belt
  description: "Intern, you've been an unprofitable asset."
  components:
  # sprites
  - type: Sprite
    sprite: _Omu/Clothing/Belt/centcomdisciplinary.rsi
    state: icon
  - type: Clothing
    sprite: _Omu/Clothing/Belt/centcomdisciplinary.rsi
  #Hurty hurts
  - type: MeleeWeapon
    wideAnimationRotation: -135
    bluntStaminaDamageFactor: 1.5
    angle: 0
    damage:
      types:
        Blunt: 12
    soundHit:
      path: /Audio/_Goobstation/Weapons/Baton/woodhit.ogg
      params:
        variation: 0.25
  - type: KnockdownOnHit
    duration: 3.0
    dropItems: true
  - type: StaminaDamageOnHit
    damage: 120
  - type: UseDelay
    delays:
      hit:
        length: 1


- type: entity
  id: EggCentCommBelt
  parent: [BaseCentcommContraband, DisciplinaryBeltBase]
  name: eggsciplinary belt
  description: "Commander, your work has been unsatisfactory. Consider yourself suspended for now."
  components:
  # sprites
  - type: Sprite
    sprite: _Omu/Clothing/Belt/eggshelldisciplinary.rsi
    state: icon
  - type: Clothing
    sprite: _Omu/Clothing/Belt/eggshelldisciplinary.rsi
  #Hurty hurts
  - type: MeleeWeapon
    attackRate: 5
    wideAnimationRotation: -135
    bluntStaminaDamageFactor: 1.5
    angle: 0
    damage:
      types:
        Blunt: 12
    soundHit:
      path: /Audio/_Goobstation/Weapons/Baton/woodhit.ogg
      params:
        variation: 0.25
  - type: KnockdownOnHit
    duration: 3.0
    dropItems: true
  - type: StaminaDamageOnHit
    damage: 120
  - type: UseDelay
    delays:
      hit:
        length: 1
  - type: EmoteOnMeleeHit
    emoteChance: 1
    emoteCooldown: 0.001
    emotes:
    - Scream


- type: entity
  id: WaistBeltSergeantBelt
  parent: [BaseSecurityContraband, DisciplinaryBeltBase]
  name: disciplinary belt
  description: A very heavy belt. "Look what you've done! Cadet, give me five NOW!"
  components:
  # sprites
  - type: Sprite
    sprite: _Omu/Clothing/Belt/sergeantdisciplinary.rsi
    state: icon
  - type: Clothing
    sprite: _Omu/Clothing/Belt/sergeantdisciplinary.rsi
  #Hurty hurts
  - type: MeleeWeapon
    wideAnimationRotation: -135
    bluntStaminaDamageFactor: 1.5
    angle: 0
    damage:
      types:
        Blunt: 12
    attackRate: 0.7
    soundHit:
      path: /Audio/_Goobstation/Weapons/Baton/woodhit.ogg
      params:
        variation: 0.25
  - type: TelescopicBaton
  - type: KnockdownOnHit
    duration: .1
    dropItems: false
  - type: StaminaDamageOnHit
    damage: 12
  - type: UseDelay
    delays:
      default:
        length: 1
  - type: UseDelayBlockMelee
    delays:
    - default

